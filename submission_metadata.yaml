ai_usage_summary: |
  Kiro AI IDE was used for code assistance throughout development.
  Gemini API (gemini-2.5-flash) is used ONLY for the one-time job-description
  parsing step (pre-computation). The ranking pipeline itself is fully
  deterministic and makes zero LLM or network calls. No candidate data was
  fed to any hosted LLM during ranking.

# ============================================================================
# Methodology summary (<=200 words -- strongly recommended)
# ============================================================================
methodology_summary: |
  Knowledge-graph-augmented deterministic ranking over all 100,000 candidates.
  The pipeline: (1) parse the JD once via LLM to extract required/preferred
  skills and experience requirements; (2) for each candidate, compute seven
  deterministic scores: required-skill match, preferred-skill match, tech-stack
  match, experience alignment, project relevance, education alignment, and
  career progression -- all resolved through a 194-node skill Knowledge Graph
  that handles aliases and semantic relationships; (3) a Hidden Skill Inference
  engine traverses the KG from each candidate's explicit skills to infer latent
  skills not on their profile; (4) a Candidate DNA engine assigns archetype
  affinities (AI Engineer, Backend, DevOps, etc.); (5) a Behavioral Intelligence
  engine scores seven engagement signals from the redrob_signals field
  (availability, responsiveness, recruiter interest, credibility, technical
  activity, learning signal, compensation compatibility); (6) a Decision Engine
  combines all components with configurable role-profile weights into an overall
  match score. Candidates are ranked by overall score using a bounded min-heap
  (O(N) memory). No embeddings, no ML model, no hosted APIs during ranking.

